<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Async Weather Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #e8f0fe;
      min-height: 100vh;
      padding: 30px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 28px;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    /* API key bar */
    .api-bar {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      color: #856404;
    }
    .api-bar input {
      flex: 1;
      border: 1px solid #ffc107;
      border-radius: 6px;
      padding: 6px 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.78rem;
      outline: none;
      background: #fffdf0;
    }
    .api-bar input:focus {
      border-color: #e6a817;
    }

    /* Two column layout */
    .main-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    @media (max-width: 580px) {
      .main-row { grid-template-columns: 1fr; }
    }

    /* Cards */
    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .card h3 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 14px;
    }

    /* Search */
    .search-row {
      display: flex;
      gap: 8px;
    }

    #city-input {
      flex: 1;
      border: 1px solid #dde;
      border-radius: 8px;
      padding: 9px 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      outline: none;
      color: #333;
      transition: border-color 0.2s;
    }

    #city-input:focus {
      border-color: #4a6cf7;
    }

    #city-input::placeholder {
      color: #aaa;
    }

    #search-btn {
      background: #4a6cf7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #search-btn:hover { background: #3a5ce5; }
    #search-btn:disabled { background: #9aadfa; cursor: not-allowed; }

    /* History */
    .history-wrap {
      margin-top: 18px;
    }

    .history-wrap h3 {
      margin-bottom: 10px;
    }

    #history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 30px;
    }

    .hist-btn {
      background: #eef0ff;
      color: #4a6cf7;
      border: 1px solid #c7ceff;
      border-radius: 20px;
      padding: 4px 14px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .hist-btn:hover {
      background: #d8dcff;
    }

    .no-hist {
      font-size: 0.8rem;
      color: #bbb;
    }

    /* Weather display */
    #weather-display {
      min-height: 130px;
    }

    .weather-placeholder {
      font-size: 0.82rem;
      color: #bbb;
      margin-top: 30px;
      text-align: center;
    }

    .weather-error {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      border-radius: 8px;
      padding: 10px 14px;
      color: #cc3333;
      font-size: 0.82rem;
    }

    .weather-city {
      font-size: 1.2rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 2px;
    }

    .weather-desc {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 14px;
      text-transform: capitalize;
    }

    .weather-temp {
      font-size: 2.4rem;
      font-weight: 600;
      color: #4a6cf7;
      margin-bottom: 14px;
      line-height: 1;
    }

    .weather-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .weather-item {
      background: #f5f7ff;
      border-radius: 8px;
      padding: 8px 12px;
    }

    .weather-item .label {
      font-size: 0.68rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .weather-item .value {
      font-size: 0.9rem;
      font-weight: 500;
      color: #333;
      margin-top: 2px;
    }

    /* Console panel */
    .console-card {
      background: #1e1e2e;
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    .console-card h3 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 12px;
    }

    #console-output {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.78rem;
      line-height: 1.9;
      min-height: 56px;
      max-height: 150px;
      overflow-y: auto;
    }

    #console-output::-webkit-scrollbar { width: 4px; }
    #console-output::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

    .log-line {
      display: flex;
      gap: 10px;
      align-items: baseline;
    }

    .log-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
    }

    .log-sync   { color: #e5c07b; }
    .log-async  { color: #61afef; }
    .log-micro  { color: #98c379; }
    .log-macro  { color: #c678dd; }
    .log-error  { color: #e06c75; }

    .log-sync  .log-dot { background: #e5c07b; }
    .log-async .log-dot { background: #61afef; }
    .log-micro .log-dot { background: #98c379; }
    .log-macro .log-dot { background: #c678dd; }
    .log-error .log-dot { background: #e06c75; }

    .console-placeholder {
      color: #555;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }
    .dot1 { animation: blink 1.2s infinite 0s; }
    .dot2 { animation: blink 1.2s infinite 0.2s; }
    .dot3 { animation: blink 1.2s infinite 0.4s; }
  </style>
</head>
<body>

  <h1>⛅ Async Weather Tracker</h1>
  
  <div class="container">

    <div class="api-bar">
      ⚠️ API Key:
      <input type="text" id="api-key-input" placeholder="Paste your OpenWeatherMap API key here" />
    </div>

    <div class="main-row">

      <div class="card">
        <h3>Search City</h3>
        <div class="search-row">
          <input type="text" id="city-input" placeholder="e.g. Delhi, London" autocomplete="off" />
          <button id="search-btn">Search</button>
        </div>

        <div class="history-wrap">
          <h3>Search History</h3>
          <div id="history-list">
            <span class="no-hist">No recent searches</span>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Weather Info</h3>
        <div id="weather-display">
          <p class="weather-placeholder">Search a city to see weather info</p>
        </div>
      </div>

    </div>

    <div class="console-card">
      <h3>Console — Event Loop</h3>
      <div id="console-output">
        <span class="console-placeholder">// logs will appear here after searching...</span>
      </div>
    </div>

  </div>

  <script>
    const API_URL     = 'https://api.openweathermap.org/data/2.5/weather';
    const HISTORY_KEY = 'wt_history';
    const APIKEY_KEY  = 'wt_apikey';
    const MAX_HIST    = 8;

    const cityInput   = document.getElementById('city-input');
    const searchBtn   = document.getElementById('search-btn');
    const weatherDiv  = document.getElementById('weather-display');
    const historyDiv  = document.getElementById('history-list');
    const consoleDiv  = document.getElementById('console-output');
    const apiKeyInput = document.getElementById('api-key-input');

    // ── Console logger ──────────────────────────
    let firstLog = true;

    function log(msg, type = 'sync') {
      if (firstLog) {
        consoleDiv.innerHTML = '';
        firstLog = false;
      }
      const line = document.createElement('div');
      line.className = 'log-line log-' + type;
      line.innerHTML = '<span class="log-dot"></span><span>' + msg + '</span>';
      consoleDiv.appendChild(line);
      consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    function resetLog() {
      consoleDiv.innerHTML = '';
      firstLog = true;
    }

    // ── Local Storage ───────────────────────────
    function getHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
      catch (e) { return []; }
    }

    function addToHistory(city) {
      var list = getHistory().filter(function(c) {
        return c.toLowerCase() !== city.toLowerCase();
      });
      list.unshift(city);
      if (list.length > MAX_HIST) list = list.slice(0, MAX_HIST);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
      renderHistory();
    }

    function renderHistory() {
      var list = getHistory();
      if (!list.length) {
        historyDiv.innerHTML = '<span class="no-hist">No recent searches</span>';
        return;
      }
      historyDiv.innerHTML = '';
      list.forEach(function(city) {
        var btn = document.createElement('button');
        btn.className = 'hist-btn';
        btn.textContent = city;
        btn.addEventListener('click', function() {
          cityInput.value = city;
          handleSearch();
        });
        historyDiv.appendChild(btn);
      });
    }

    // ── Weather emoji ────────────────────────────
    function getEmoji(condition) {
      var c = (condition || '').toLowerCase();
      if (c.includes('clear'))   return '☀️';
      if (c.includes('cloud'))   return '⛅';
      if (c.includes('rain') || c.includes('drizzle')) return '🌧️';
      if (c.includes('thunder')) return '⛈️';
      if (c.includes('snow'))    return '❄️';
      if (c.includes('haze') || c.includes('mist') || c.includes('fog')) return '🌫️';
      return '🌡️';
    }

    // ── Render weather result ────────────────────
    function showWeather(data) {
      var emoji    = getEmoji(data.weather[0].main);
      var cityName = data.name + ', ' + data.sys.country;
      var temp     = Math.round(data.main.temp);
      var desc     = data.weather[0].description;
      var humidity = data.main.humidity;
      var wind     = data.wind.speed;
      var feels    = Math.round(data.main.feels_like);

      weatherDiv.innerHTML =
        '<div class="weather-city">' + emoji + ' ' + cityName + '</div>' +
        '<div class="weather-desc">' + desc + '</div>' +
        '<div class="weather-temp">' + temp + '°C</div>' +
        '<div class="weather-grid">' +
          '<div class="weather-item"><div class="label">Feels like</div><div class="value">' + feels + '°C</div></div>' +
          '<div class="weather-item"><div class="label">Humidity</div><div class="value">' + humidity + '%</div></div>' +
          '<div class="weather-item"><div class="label">Wind</div><div class="value">' + wind + ' m/s</div></div>' +
          '<div class="weather-item"><div class="label">Condition</div><div class="value">' + data.weather[0].main + '</div></div>' +
        '</div>';
    }

    function showError(msg) {
      weatherDiv.innerHTML = '<div class="weather-error">⚠️ ' + msg + '</div>';
    }

    function showLoading() {
      weatherDiv.innerHTML =
        '<p style="color:#aaa;font-size:.82rem;margin-top:30px;text-align:center;">' +
        'Fetching weather<span class="dot1">.</span><span class="dot2">.</span><span class="dot3">.</span>' +
        '</p>';
    }

    // ── Fetch weather data ──────────────────────
    // Uses BOTH async/await AND .then()/.catch() to demonstrate both patterns
    async function fetchWeather(city) {
      var apiKey = apiKeyInput.value.trim();
      if (!apiKey) throw new Error('NO_KEY');

      var url = API_URL + '?q=' + encodeURIComponent(city) + '&appid=' + apiKey + '&units=metric';

      // Synchronous logs — run before fetch() yields
      log('Sync Start — fetchWeather() called', 'sync');
      log('Sync End   — fetch() called, yielding to event loop', 'sync');

      // .then()/.catch() chaining on the raw fetch promise
      var rawPromise = fetch(url)
        .then(function(res) {
          log('Promise.then (Microtask) — got HTTP ' + res.status, 'micro');
          return res;
        })
        .catch(function(netErr) {
          log('Promise.catch — network error: ' + netErr.message, 'error');
          throw netErr;
        });

      // setTimeout to show macrotask runs AFTER microtasks
      setTimeout(function() {
        log('setTimeout (Macrotask) — ran after all pending microtasks', 'macro');
      }, 0);

      // async/await — suspends here, resumes when rawPromise resolves
      log('[ASYNC] Start fetching...', 'async');
      var response = await rawPromise;

      if (response.status === 404) throw new Error('CITY_NOT_FOUND');
      if (!response.ok)            throw new Error('API_ERROR');

      var data = await response.json();
      log('[ASYNC] Data received — resuming after await', 'async');

      return data;
    }

    // ── Main search handler ──────────────────────
    async function handleSearch() {
      var city = cityInput.value.trim();

      if (!city) {
        showError('Please enter a city name.');
        return;
      }

      resetLog();
      log('handleSearch() called — synchronous execution starts', 'sync');

      searchBtn.disabled = true;
      searchBtn.textContent = 'Searching...';
      showLoading();

      try {
        var data = await fetchWeather(city);
        showWeather(data);
        addToHistory(data.name);
        log('Success — data rendered to page', 'async');

      } catch (err) {
        log('Caught in try...catch: ' + err.message, 'error');

        if (err.message === 'NO_KEY') {
          showError('Please paste your OpenWeatherMap API key in the bar above.');
        } else if (err.message === 'CITY_NOT_FOUND') {
          showError('City not found. Please check the spelling and try again.');
        } else if (err.message === 'API_ERROR') {
          showError('API error. Please check your API key and try again.');
        } else {
          showError('Network error. Check your internet connection.');
        }

      } finally {
        // finally runs regardless of success or failure
        log('finally block — UI cleanup (always executes)', 'sync');
        searchBtn.disabled = false;
        searchBtn.textContent = 'Search';
      }
    }

    // ── Event listeners ──────────────────────────
    searchBtn.addEventListener('click', handleSearch);

    cityInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleSearch();
    });

    // ── Init on page load ────────────────────────
    (function init() {
      renderHistory();
      var savedKey = localStorage.getItem(APIKEY_KEY);
      if (savedKey) apiKeyInput.value = savedKey;
      apiKeyInput.addEventListener('input', function() {
        localStorage.setItem(APIKEY_KEY, apiKeyInput.value.trim());
      });
    })();
  </script>

</body>
</html>
